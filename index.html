<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudMoon</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        .status-bar { background: #1a1a1a; color: #888; padding: 5px; text-align: center; font-size: 11px; font-family: sans-serif; }
        iframe { width: 100%; height: calc(100vh - 25px); border: none; }
    </style>
</head>
<body>
    <div class="status-bar">CloudMoon Desktop Launcher</div>
    <iframe src="https://web.cloudmoonapp.com" allow="autoplay; fullscreen; gamepad"></iframe>
</body>
</html>
