<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MafiaBar Patreons</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #222; color: #eee; }
    h1 { margin-bottom: 1rem; }
    #list { border: 1px solid #555; padding: 0.5rem; max-width: 400px; background: #333; }
    .item { padding: 0.25rem; cursor: pointer; }
    .item.selected { background: #555; }
    #preview { margin-top: 1rem; }
    #controls { margin-top: 1rem; }
    button { margin: 0.25rem; padding: 0.5rem 1rem; }
    input[type="text"] { margin-top: 0.5rem; width: 90%; }
  </style>
</head>
<body>
  <h1>MafiaBar Patreons</h1>

  <div id="list"></div>

  <div id="preview">
    <h3>Preview</h3>
    <img id="bannerPreview" src="" alt="No Banner" style="max-width:200px; display:block; margin-bottom:1rem;">
  </div>

  <div id="controls">
    <button id="moveUp">Move Up</button>
    <button id="moveDown">Move Down</button><br>
    <input type="text" id="renameInput" placeholder="Rename"><br>
    <button id="renameBtn">Rename</button><br>
    <input type="file" id="uploadInput" accept="image/*"><br>
    <button id="addBanner">Add/Change Banner</button>
    <button id="removeBanner">Remove Banner</button><br><br>

    <!-- NEW -->
    <button id="downloadTxt">Download Patreons.txt</button>
    <button id="downloadBanner">Download Current Banner</button>
  </div>

  <script>
    let patreons = [];
    let selectedIndex = -1;
    let pendingBanners = {}; // NEW: holds uploaded blobs that aren't in repo yet

    async function loadPatreons() {
      const res = await fetch("MafiaBar/Patreons.txt");
      const text = await res.text();
      const lines = text.split("\n").map(l => l.trim()).filter(l => l && !l.startsWith("//"));

      patreons = lines.map(line => {
        const parts = line.split("||");
        return {
          raw: line, // keep raw just in case
          name: parts[0],
          hasBanner: parts.includes("ShowBanner"),
          slot: parts.find(p => p.startsWith("Slot:"))?.split(":")[1] || null,
        };
      });

      renderList();
    }

    function renderList() {
      const list = document.getElementById("list");
      list.innerHTML = "";
      patreons.forEach((p, i) => {
        const div = document.createElement("div");
        div.textContent = p.name;
        div.className = "item" + (i === selectedIndex ? " selected" : "");
        div.onclick = () => selectItem(i);
        list.appendChild(div);
      });
    }

    function selectItem(i) {
      selectedIndex = i;
      renderList();
      updatePreview();
      document.getElementById("renameInput").value = patreons[i].name;
    }

    function updatePreview() {
      const p = patreons[selectedIndex];
      const img = document.getElementById("bannerPreview");
      if (p?.hasBanner && p.slot !== null) {
        if (pendingBanners[p.slot]) {
          img.src = URL.createObjectURL(pendingBanners[p.slot]); // show new banner
        } else {
          img.src = `MafiaBar/banner${p.slot}.png?${Date.now()}`; // show existing
        }
        img.style.display = "block";
      } else {
        img.src = "";
        img.style.display = "none";
      }
    }

    // Reorder
    document.getElementById("moveUp").onclick = () => {
      if (selectedIndex > 0) {
        [patreons[selectedIndex - 1], patreons[selectedIndex]] = [patreons[selectedIndex], patreons[selectedIndex - 1]];
        selectedIndex--;
        renderList();
      }
    };

    document.getElementById("moveDown").onclick = () => {
      if (selectedIndex < patreons.length - 1) {
        [patreons[selectedIndex + 1], patreons[selectedIndex]] = [patreons[selectedIndex], patreons[selectedIndex + 1]];
        selectedIndex++;
        renderList();
      }
    };

    // Rename
    document.getElementById("renameBtn").onclick = () => {
      if (selectedIndex >= 0) {
        patreons[selectedIndex].name = document.getElementById("renameInput").value.trim();
        renderList();
      }
    };

    // Add/Change banner
    document.getElementById("addBanner").onclick = async () => {
      if (selectedIndex < 0) return;
      const fileInput = document.getElementById("uploadInput");
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const resizedBlob = await resizeImage(file, 512, 1024);

        const nextSlot = patreons[selectedIndex].slot || getNextAvailableSlot();
        patreons[selectedIndex].hasBanner = true;
        patreons[selectedIndex].slot = nextSlot;

        pendingBanners[nextSlot] = resizedBlob; // store locally

        updatePreview();
      }
    };

    // Remove banner
    document.getElementById("removeBanner").onclick = () => {
      if (selectedIndex >= 0) {
        patreons[selectedIndex].hasBanner = false;
        pendingBanners[patreons[selectedIndex].slot] = null;
        patreons[selectedIndex].slot = null;
        updatePreview();
      }
    };

    function getNextAvailableSlot() {
      const used = new Set(patreons.filter(p => p.slot !== null).map(p => parseInt(p.slot)));
      let slot = 1;
      while (used.has(slot)) slot++;
      return slot;
    }

    function resizeImage(file, width, height) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          canvas.toBlob(blob => resolve(blob), "image/png");
        };
        img.src = URL.createObjectURL(file);
      });
    }

    // --- NEW: Export Patreons.txt
    document.getElementById("downloadTxt").onclick = () => {
      const lines = ["//Header"];
      patreons.forEach(p => {
        if (p.hasBanner && p.slot) {
          lines.push(`${p.name}|ShowBanner|Slot:${p.slot}`);
        } else {
          lines.push(p.name);
        }
      });
      lines.push("//End");

      const blob = new Blob([lines.join("\n")], { type: "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "Patreons.txt";
      a.click();
    };

    // --- NEW: Export current banner (if uploaded/changed)
    document.getElementById("downloadBanner").onclick = () => {
      if (selectedIndex < 0) return;
      const slot = patreons[selectedIndex].slot;
      if (!slot || !pendingBanners[slot]) return;

      const blob = pendingBanners[slot];
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `banner${slot}.png`;
      a.click();
    };

    loadPatreons();
  </script>
</body>
</html>
