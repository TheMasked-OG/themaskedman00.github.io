name: Build Atlases

on:
  push:
    branches: [ "Site" ]   # run when changes are pushed to Site branch
  workflow_dispatch:        # also allow manual run from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Site branch
        uses: actions/checkout@v4
        with:
          ref: Site
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Pillow
        run: pip install pillow

      - name: Build atlases
        run: python scripts/build_atlas.py   # adjust path if script is elsewhere

      - name: Commit atlas files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add special-folder/Atlas*.png
          git commit -m "Update atlases" || echo "No changes to commit"
          git push origin Site
